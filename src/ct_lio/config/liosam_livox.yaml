YAML: 1.0

preprocess:
  point_filter_num: 1
  # Raw bag topic is livox_ros_driver2/CustomMsg. The physical sensor is not
  # assumed to be MID360; this only selects the Livox CustomMsg packet parser.
  lidar_type: 1
  lidar_header_stamp_is_end: false
  scan_line: 32
  blind: 1.0
  max_range: 1000.0

common:
  imu_topic: /livox/imu
  lid_topic: /livox/lidar
  cmd_vel_topic: ""

mapping:
  extrinsic_est_en: false
  # Reference: /home/ubuntu20/LIOSAM_ws/src/LIO-SAM-master/config/params.yaml
  # LIO-SAM extTrans is used here as T_IL: LiDAR origin expressed in IMU frame.
  extrinsic_T: [ -0.173896233, -0.110653711, -0.249088050 ]
  extrinsic_R: [ 1, 0, 0,  0, 1, 0,  0, 0, 1 ]

delay_time: 0.0

imu_initialization:
  init_time_seconds: 1.0
  use_speed_for_static_checking: false
  max_static_gyro_var: 2.0
  max_static_acce_var: 30.0
  gravity_norm: 9.80511
  # The bag IMU acceleration norm is about 1 g; CT-LIO propagation expects m/s^2.
  acceleration_scale: 9.80511

odometry:
  surf_res: 0.4
  log_print: false
  max_num_iteration: 5
  icpmodel: CT_POINT_TO_PLANE
  size_voxel_map: 0.4
  min_distance_points: 0.05
  max_num_points_in_voxel: 20
  max_distance: 50.0
  map_max_frame_age: 0
  weight_alpha: 0.9
  weight_neighborhood: 0.1
  max_dist_to_plane_icp: 0.5
  init_num_frames: 20
  voxel_neighborhood: 1
  max_number_neighbors: 20
  threshold_voxel_occupancy: 1
  estimate_normal_from_neighborhood: true
  min_number_neighbors: 10
  power_planarity: 2.0
  num_closest_neighbors: 1

  sampling_rate: 1.0
  ratio_of_nonground: 2
  max_num_residuals: 1200
  min_num_residuals: 120
  motion_compensation: CONTINUOUS
  beta_location_consistency: 2.0
  beta_orientation_consistency: 2.0
  beta_constant_velocity: 0.5
  beta_scan_translation: 0.0
  beta_small_velocity: 0.0
  beta_relative_orientation: 0.0
  beta_relative_yaw: 0.0
  beta_nonholonomic: 0.0
  beta_frame_nonholonomic: 0.0
  beta_world_z_consistency: 0.0
  beta_world_z_reference: 0.0
  beta_command_translation: 0.0
  beta_command_lateral: 0.0
  beta_command_yaw: 0.0
  command_motion_max_gap: 0.25
  command_motion_min_samples: 2

  thres_translation_norm: 0.01
  thres_orientation_norm: 0.1

do_ct_lio:
  hessian_12d:
    enabled: true
    logging_only: true
    effective_rank_threshold: 8
    relative_eigen_floor: 1.0e-6
    rotation_scale_meters: 1.0
    log_every_n_frames: 50
    log_first_iteration_only: true
    finite_difference_enabled: true
    finite_difference_max_columns: 12
    finite_difference_epsilon: 1.0e-5
    log_path: /tmp/do_ct_lio_livox_hessian_diagnostics.csv
  degeneracy_aware:
    enable: true
    diagnostic_6d: false
    log_diagnostics: true
    jacobian_check: true
    lambda0: 0.08
    gamma: 0.7
    omega_min: 0.15
    omega_max: 1.5
    rotation_scale_mode: adaptive
    rotation_scale: 8.0
    rotation_scale_min: 2.0
    rotation_scale_max: 20.0
    bucket_size: 0.8
    bucket_top_k: 6
    time_bucket_count: 4
    min_candidates: 120
    max_candidate_multiplier: 3
    degeneracy_threshold: 0.05
    effective_rank_threshold: 8
    prior_boost: 1.0
    prior_boost_max: 2.0
    max_weight_delta: 0.2
    jacobian_norm_min: 1.0e-8
    post_solve_projection: false
    projection_strength: 0.0
    projection_min_gate_threshold: 0.12
    log_path: /tmp/do_ct_lio_livox_degeneracy_weights.csv
